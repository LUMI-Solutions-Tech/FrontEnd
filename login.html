<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | Lumi Solutions</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="estilosCss/styles.css">
    <link rel="stylesheet" href="estilosCss/loginCadastro.css">
</head>

<body>
    <!-- PARTE RAISSA -->
    <header id="home">
        <div class="cabecalho-menu">
            <div class="logo-container">
                <img src="imagens/icons/logo.svg" alt="Logo Lumi Solutions" class="img-logo">
                <p class="nome-logo">Lumi Solutions Tech</p>
            </div>

            <div class="menu">
                <a href="index.html" target="_blank" class="opcoes-menu">Início</a>
                <a href="calculadora.html" target="_blank" class="opcoes-menu">Calculadora</a>
                <a href="sobre.html" target="_blank" class="opcoes-menu">Sobre nós</a>
                <a href="#rodape" class="opcoes-menu">Contato</a>
                <a href="login.html" target="_blank" class="opcoes-menu login">Entre</a>
                <a href="cadastro.html" target="_blank" class="opcoes-menu cadastro">Cadastre-se</a>
            </div>
        </div>
    </header>

    <section>
        <div class="container-cadastro">

            <img src="imagens/alface-tela-login.svg" alt="Plantação de alfaces" class="img-cadastro">
            <div class="inputsCadastro">
                <div class="topo-login">
                    <p class="boasvindas-text">Bem vindo ao <strong>LUMI</strong></p>

                    <div class="toggle-botoes">
                        <button class="btn-toggle active toggle-link"><a href="login.html">Login</a></button>
                        <button class="btn-toggle toggle-link"><a href="cadastro.html">Cadastrar</a></button>
                    </div>
                </div>

                <h2 class="title-cadastro">Login</h2>
                <p class="text-cadastro">Faça o login com sua conta Lumi</p>

                <div class="cadastro-email">
                    <div class="grupo-input">
                        <input type="text" id="ipt_email" class="ipt_cadastro" placeholder="">
                        <label>Email</label>
                    </div>
                </div>

                <div class="grupo-input">
                    <input type="password" id="iptSenha" class="ipt_cadastroSenha" placeholder="">
                    <label>Senha</label>
                </div>

                <button onclick="cadastrar()" class="btn-cadastro">Login</button>
                <br><br>
                <p class="msgCadastro">Não tem uma conta? <a class="msgLoginLink" href="cadastro.html"><span>Cadastre-se</span></a>
                </p>

                <a href="dashboard.html" id="linkDashboard" style="display:none;">Ir para dashboard</a>
            </div>
        </div>
    </section>
    <!-- PARTE RAISSA -->
</body>

</html>
<!-- PARTE MICKAELA -->
<script>

    let tentativas = 3
    function cadastrar() {

        let email = ipt_email.value;
        let senha = iptSenha.value;

        if (email == `` && (!email.includes('@') || !email.includes('.com'))) {
            alert(`Por favor, insira um email válido`)

        } else if (senha == ``) {

            alert(`Por favor, insira uma senha válida`)

        }
        else if (email == `admin@gmail.com` && senha == `Lumi123`) {

            alert(`Login efetuado com sucesso!`)
            // PARTE RAISSA
            linkDashboard.click();
            // PARTE RAISSA

        } else {

            if (tentativas > 0) {

                tentativas -= 1
                alert(`Erro no login, email ou senha incorretos, restam ${tentativas} tentativas`)

            } else if(tentativas <=0){

                alert(`Usuário bloqueado!`)
            }
        }
    }

</script>
<!-- PARTE MICKAELA -->
